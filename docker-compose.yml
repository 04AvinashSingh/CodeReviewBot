services:
  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: codereviewbot-db
    environment:
      POSTGRES_DB: codereviewbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot App ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codereviewbot-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DB_URL: jdbc:postgresql://postgres:5432/codereviewbot
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      GITHUB_PRIVATE_KEY_PATH: /app/github-private-key.pem
      PORT: 8080
    env_file:
      - .env
    volumes:
      - ./github-private-key.pem:/app/github-private-key.pem:ro
    restart: unless-stopped

volumes:
  postgres_data:
